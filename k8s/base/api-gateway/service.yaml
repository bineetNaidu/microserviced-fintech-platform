apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fintech
  labels:
    app: api-gateway
    component: gateway
spec:
  # ─── WHY LoadBalancer? ───────────────────────────────────────────────────────
  # The API Gateway is the ONLY service that needs to be reachable from outside the cluster.
  # All other services use ClusterIP (internal only).
  #
  # LoadBalancer type provisions a cloud load balancer:
  #   - AWS:   Network Load Balancer (NLB) or Application Load Balancer (ALB) via AWS LB Controller
  #   - GCP:   Cloud Load Balancer
  #   - Azure: Azure Load Balancer
  #
  # In local development (kind, minikube):
  #   - kind: Use `kubectl port-forward svc/api-gateway 8080:8080 -n fintech`
  #   - minikube: Use `minikube tunnel` to get an external IP
  #   - The overlays/local/kustomization.yaml patches this to NodePort for local k8s clusters
  #
  # In production, you'd typically put an Ingress (nginx-ingress or AWS ALB Ingress Controller)
  # in FRONT of this LoadBalancer Service to handle TLS termination and path-based routing.
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80 # External port (what clients connect to)
      targetPort: http # Pod port 8080 (mapped by the 'http' named port)
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: fintech
data:
  NODE_ENV: 'production'
  SERVICE_NAME: 'api-gateway'
  PORT: '8080'
  LOG_LEVEL: 'info'
  # Upstream service URLs use K8s internal DNS: {service-name}.{namespace}.svc.cluster.local
  # Within the same namespace, you can shorten to: {service-name}:{port}
  AUTH_SERVICE_URL: 'http://auth-service:3001'
  USER_SERVICE_URL: 'http://user-service:3002'
  ACCOUNT_SERVICE_URL: 'http://account-service:3003'
  TRANSFER_SERVICE_URL: 'http://transfer-service:3004'
  # ALLOWED_ORIGINS is overridden per environment in overlays.
  # Base value is for safety — the overlay patches in the real production domain.
  ALLOWED_ORIGINS: 'https://app.fintech.example.com'
---
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: fintech
type: Opaque
# PLACEHOLDER — see auth-service/service.yaml for secret management options.
stringData:
  REDIS_URL: 'redis://:REPLACE_ME@redis:6379'
  JWT_PUBLIC_KEY: 'REPLACE_ME_WITH_RSA_PUBLIC_KEY_PEM'
