apiVersion: v1
kind: Namespace
metadata:
  name: fintech
  labels:
    # All K8s resources in this platform live in the 'fintech' namespace.
    # Namespacing isolates our workloads from other apps on the same cluster —
    # e.g., if you run a separate monitoring stack, it goes in 'monitoring' namespace
    # so resource limits, RBAC roles, and NetworkPolicies don't bleed across.
    app.kubernetes.io/managed-by: kustomize
    environment: base
